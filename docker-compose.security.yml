# ============================================
# Local SonarQube stack for HEPZA security scans
# ============================================
# Usage:
#   docker compose -f docker-compose.security.yml up -d
#   Open http://localhost:9000 and create a project token.
# ============================================

services:
  sonarqube:
    image: sonarqube:26.4.0.121862-community
    container_name: hepza-local-sonarqube
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: ${SONAR_JDBC_USERNAME:-sonar}
      SONAR_JDBC_PASSWORD: ${SONAR_JDBC_PASSWORD:-sonar}
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    restart: unless-stopped

  sonar-db:
    image: postgres:16-alpine
    container_name: hepza-local-sonarqube-db
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: ${SONAR_JDBC_USERNAME:-sonar}
      POSTGRES_PASSWORD: ${SONAR_JDBC_PASSWORD:-sonar}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_JDBC_USERNAME:-sonar} -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - sonarqube_postgres:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_postgres:
