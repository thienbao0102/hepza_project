# Prometheus config for LOCAL benchmark environment
# Stripped down: no nginx, no cadvisor/node-exporter (Linux-only)
global:
  scrape_interval: 5s      # Aggressive scraping for benchmark visibility
  scrape_timeout: 5s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: hepza-backend
    metrics_path: /api/metrics
    scrape_interval: 15s       # Wider interval because metrics endpoint can be heavy
    scrape_timeout: 10s        # Backend metrics can be slow under load
    static_configs:
      - targets:
          - backend:5000

  - job_name: hepza-redis
    static_configs:
      - targets:
          - redis-exporter:9121

