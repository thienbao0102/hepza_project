global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: hepza-backend
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - backend:5000

  - job_name: hepza-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:5001

  - job_name: hepza-node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: hepza-cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: hepza-redis
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: hepza-nginx
    static_configs:
      - targets:
          - nginx-exporter:9113
