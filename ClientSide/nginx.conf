# Frontend SPA Nginx config (bên trong container frontend)
server {
    listen 80;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers for the SPA entry and static assets.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), payment=(), usb=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https://res.cloudinary.com https://*.tile.openstreetmap.org; connect-src 'self' https://hepza.click https://www.hepza.click https://api2.hepza.click wss://hepza.click wss://www.hepza.click wss://api2.hepza.click https://api.openweathermap.org https://router.project-osrm.org; upgrade-insecure-requests" always;

    # Ngăn Nginx redirect sang http:// khi đứng sau reverse proxy
    absolute_redirect off;

    # SPA fallback — mọi route trả về index.html (KHÔNG dùng $uri/ để tránh redirect http)
    location / {
        try_files $uri /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Không cache index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
