# ============================================
# Hepza PRODUCTION — docker-compose
# Port host-local only: frontend=3000, backend=5000, redis=6379
# ============================================

services:
  frontend:
    build:
      context: ./ClientSide
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL:-https://hepza.click}
        VITE_CLIENT_URL: ${VITE_CLIENT_URL:-https://hepza.click}
        VITE_USE_SOCKET_API: ${VITE_USE_SOCKET_API:-true}
    container_name: hepza-prod-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - hepza-network

  backend:
    build: ./ServerSide
    container_name: hepza-prod-backend
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - PORT=5000
      - WORKER_PORT=5001
      - REDIS_URL=redis://hepza-prod-redis:6379
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - hepza-network

  worker:
    build: ./ServerSide
    container_name: hepza-prod-worker
    command: node worker/notificationWorker.js
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - PORT=5000
      - WORKER_PORT=5001
      - REDIS_URL=redis://hepza-prod-redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      disable: true
    networks:
      - hepza-network

  redis:
    image: redis:7-alpine
    container_name: hepza-prod-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hepza-network

volumes:
  redis_prod_data:

networks:
  hepza-network:
    name: hepza-network
    driver: bridge

