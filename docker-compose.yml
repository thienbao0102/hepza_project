# ============================================
# Hepza Docker Compose — Production
# ============================================
# Quick start:
#   1. Copy .env.production.template → .env.production
#   2. Fill in all values
#   3. docker compose up -d --build
#   4. Open http://localhost
# ============================================

services:
  # --- Reverse Proxy ---
  nginx:
    image: nginx:1.27-alpine
    container_name: hepza-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hepza-network

  # --- Frontend (React SPA) ---
  frontend:
    build:
      context: ./ClientSide
      dockerfile: Dockerfile
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL:-http://localhost}
        VITE_CLIENT_URL: ${VITE_CLIENT_URL:-http://localhost}
    container_name: hepza-frontend
    restart: unless-stopped
    networks:
      - hepza-network

  # --- Backend API (Express) ---
  backend:
    build:
      context: ./ServerSide
      dockerfile: Dockerfile
    container_name: hepza-backend
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=5000
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hepza-network

  # --- Notification Worker (BullMQ) ---
  worker:
    build:
      context: ./ServerSide
      dockerfile: Dockerfile
    container_name: hepza-worker
    command: ["node", "worker/notificationWorker.js"]
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - WORKER_PORT=5001
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Override health check cho worker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - hepza-network

  # --- Redis (Cache + Queue) ---
  redis:
    image: redis:7-alpine
    container_name: hepza-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hepza-network

  # --- SSL Certificate (Let's Encrypt) ---
  certbot:
    image: certbot/certbot
    container_name: hepza-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Chạy 1 lần rồi exit, renew bằng cron
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - hepza-network

volumes:
  redis_data:
    driver: local

networks:
  hepza-network:
    driver: bridge
