# ZAP API scan report-only configuration.
# Format: rule_id=IGNORE|INFO|WARN|FAIL
# Phase 1 intentionally does not fail deployments; CI controls report-only behavior.

# Common noisy findings for authenticated API scans can be tuned here after triage.
# 10015=WARN  # Incomplete or No Cache-control Header Set
# 10020=WARN  # Missing anti-clickjacking Header
# 10021=WARN  # X-Content-Type-Options Header Missing
# 10035=WARN  # Strict-Transport-Security Header
